<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="drop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c71c4" />
      <stop offset="100%" stop-color="#2aa198" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Drop Shape -->
  <path d="M256,48 C160,192 96,280 96,352 A160,160 0 0,0 416,352 C416,280 352,192 256,48 Z" 
        fill="url(#drop-grad)" 
        filter="url(#glow)" />
  
  <!-- Stylized Geometric Inner 'X' -->
  <path d="M200,240 L240,290 L200,340 H235 L256,310 L277,340 H312 L272,290 L312,240 H277 L256,270 L235,240 Z" 
        fill="#ffffff" 
        opacity="0.95" />
</svg>
